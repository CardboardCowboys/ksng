[package]
name = "klib"
version = "0.1.0"
edition = "2021"

[dependencies]
binary_rw = "4.1.0"
log = "0.4.27"
parley = "0.5.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
sortedlist-rs = "0.2.5"
uuid = { version = "1.17.0", features = ["serde", "v4"] }
vello = "0.5.0"
wgpu = { version = "24.0.5", default-features = false }
